apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: realms.keycloak.kubed.io
spec:
  writeConnectionSecretsToNamespace: crossplane
  compositeTypeRef:
    apiVersion: keycloak.kubed.io/v1alpha1
    kind: Realm
  mode: Pipeline
  pipeline:
  - step: module
    functionRef:
      name: patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: workspace
        base:
          apiVersion: opentofu.upbound.io/v1beta1
          kind: Workspace
          metadata:
            name: realm
            annotations:
              kubernetes.io/description: |
                Creates a Keycloak realm.
          spec:
            providerConfigRef:
              name: keycloak
            forProvider:
              source: Remote
              module: github.com/kubed-io/terraform-keycloak-components//modules/realm?ref=main
              # filled out by the patch-and-transform function
              varmap: {}
              # SMTP creds → sensitive TF_VAR_*. The env entries' NAME + secret KEY are static
              # here (constants); only the secretKeyRef name/namespace are patched, from
              # spec.smtp.credentialsRef. The username comes from the SA secret's `mail` key
              # (docker-mailserver authenticates SMTP AUTH by binding the user it resolves via
              # (mail=%s), so the username must equal the LDAP mail attribute, not the uid).
              # A realm without spec.smtp leaves secretKeyRef.name unset (the patch is skipped)
              # and the SMTP block itself is never emitted by the module, so the unused env is
              # inert. Same secretRef→env pattern as the LdapFederation composition.
              env:
              - name: TF_VAR_smtp_username
                secretKeyRef:
                  key: mail
                  name: ""
                  namespace: ""
              - name: TF_VAR_smtp_password
                secretKeyRef:
                  key: password
                  name: ""
                  namespace: ""
        patches:

        # name after the instance name
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: "%s.realms.keycloak"

        # now set the actual workspace name as the external name
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: metadata.annotations[crossplane.io/external-name]
          transforms:
          - type: string
            string:
              type: Format
              fmt: "%s-realm"

        # --- map name ---
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: spec.forProvider.varmap.name

        # --- General (top-level) ---
        - type: FromCompositeFieldPath
          fromFieldPath: spec.displayName
          toFieldPath: spec.forProvider.varmap.display_name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.displayNameHtml
          toFieldPath: spec.forProvider.varmap.display_name_html
        - type: FromCompositeFieldPath
          fromFieldPath: spec.enabled
          toFieldPath: spec.forProvider.varmap.enabled
        - type: FromCompositeFieldPath
          fromFieldPath: spec.sslRequired
          toFieldPath: spec.forProvider.varmap.ssl_required
        - type: FromCompositeFieldPath
          fromFieldPath: spec.userManagedAccess
          toFieldPath: spec.forProvider.varmap.user_managed_access
        - type: FromCompositeFieldPath
          fromFieldPath: spec.organizationsEnabled
          toFieldPath: spec.forProvider.varmap.organizations_enabled
        - type: FromCompositeFieldPath
          fromFieldPath: spec.adminPermissionsEnabled
          toFieldPath: spec.forProvider.varmap.admin_permissions_enabled
        - type: FromCompositeFieldPath
          fromFieldPath: spec.internalId
          toFieldPath: spec.forProvider.varmap.internal_id
        - type: FromCompositeFieldPath
          fromFieldPath: spec.terraformDeletionProtection
          toFieldPath: spec.forProvider.varmap.terraform_deletion_protection
        - type: FromCompositeFieldPath
          fromFieldPath: spec.attributes
          toFieldPath: spec.forProvider.varmap.attributes
        - type: FromCompositeFieldPath
          fromFieldPath: spec.defaultDefaultClientScopes
          toFieldPath: spec.forProvider.varmap.default_default_client_scopes
        - type: FromCompositeFieldPath
          fromFieldPath: spec.defaultOptionalClientScopes
          toFieldPath: spec.forProvider.varmap.default_optional_client_scopes

        # --- grouped tabs: map the whole nested object straight to its var ---
        # (inner keys stay camelCase, matching the module's object var keys)
        - type: FromCompositeFieldPath
          fromFieldPath: spec.themes
          toFieldPath: spec.forProvider.varmap.themes
        - type: FromCompositeFieldPath
          fromFieldPath: spec.login
          toFieldPath: spec.forProvider.varmap.login
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tokens
          toFieldPath: spec.forProvider.varmap.tokens
        - type: FromCompositeFieldPath
          fromFieldPath: spec.securityDefenses
          toFieldPath: spec.forProvider.varmap.security_defenses
        - type: FromCompositeFieldPath
          fromFieldPath: spec.internationalization
          toFieldPath: spec.forProvider.varmap.internationalization
        - type: FromCompositeFieldPath
          fromFieldPath: spec.policies
          toFieldPath: spec.forProvider.varmap.policies

        # --- SMTP: mapped field-by-field so the credentialsRef (handled via env,
        # below) is NOT passed into the module's smtp object var ---
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.host
          toFieldPath: spec.forProvider.varmap.smtp.host
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.port
          toFieldPath: spec.forProvider.varmap.smtp.port
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.from
          toFieldPath: spec.forProvider.varmap.smtp.from
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.fromDisplayName
          toFieldPath: spec.forProvider.varmap.smtp.fromDisplayName
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.replyTo
          toFieldPath: spec.forProvider.varmap.smtp.replyTo
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.replyToDisplayName
          toFieldPath: spec.forProvider.varmap.smtp.replyToDisplayName
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.envelopeFrom
          toFieldPath: spec.forProvider.varmap.smtp.envelopeFrom
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.starttls
          toFieldPath: spec.forProvider.varmap.smtp.starttls
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.ssl
          toFieldPath: spec.forProvider.varmap.smtp.ssl
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.allowUtf8
          toFieldPath: spec.forProvider.varmap.smtp.allowUtf8

        # --- SMTP creds → TF_VAR env (the smtp.credentialsRef Secret) ---
        # env[0]/env[1] (name + secret key) are static in the base; here we only fill the
        # secretKeyRef name/namespace from spec.smtp.credentialsRef. A realm without spec.smtp
        # leaves them at "" (patch skipped) and the module emits no SMTP block, so it's inert.
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.credentialsRef.name
          toFieldPath: spec.forProvider.env[0].secretKeyRef.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.credentialsRef.namespace
          toFieldPath: spec.forProvider.env[0].secretKeyRef.namespace
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.credentialsRef.name
          toFieldPath: spec.forProvider.env[1].secretKeyRef.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.smtp.credentialsRef.namespace
          toFieldPath: spec.forProvider.env[1].secretKeyRef.namespace

        # publish the module outputs back to the XR status (freeform)
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.outputs
          toFieldPath: status.share
